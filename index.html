<head>

    <meta name="keywords" content="명언, 명언 모음, 인생 명언, 짧은 명언, 좋은 글귀, 동기부여, 성공, 사랑, 지혜, 영화 명대사, 드라마 명대사, 투자 명언, 재스퍼">
    <meta name="google-adsense-account" content="ca-pub-5029784324732715">
    <link rel="canonical" href="https://jasper-adsense-test.pages.dev/">
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="재스퍼의 명언 모음집 - 1000+개의 영감을 주는 지혜">
    <meta property="og:description" content="스티브 잡스, 워런 버핏부터 영화 '인터스텔라', '오펜하이머'의 명대사까지, 당신의 삶에 영감을 더할 지혜를 만나보세요.">

    <meta property="og:locale" content="ko_KR">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="재스퍼의 명언 모음집 - 1000+개의 영감을 주는 지혜">
    <meta name="twitter:description" content="인생을 바꾸는 한 문장, 영화 속 명대사, 투자 대가의 철학을 한 곳에서 만나보세요.">

    <!-- Structured Data (same as before) -->

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700&family=Gowun+Batang:wght@400;700&family=Black+Han+Sans&display=swap" rel="stylesheet">

    <!-- Analytics (same as before) -->
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="/" class="logo">재스퍼의 명언 모음집</a>
            <nav class="main-nav" aria-label="주요 네비게이션">
                <ul>
                    <li><a href="#daily">오늘의 명언</a></li>
                    <li><a href="#categories">카테고리</a></li>
                    <li><a href="#people">인물별</a></li>
                    <li><a href="#allQuotes">전체 보기</a></li>
                </ul>
            </nav>
            <button class="mobile-menu-btn" aria-label="메뉴 열기">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="hero" id="daily" aria-label="오늘의 명언">
            <div class="hero-bg" id="dailyBg"></div>
            <div class="hero-overlay"></div>
            <div class="container">
                <h1 class="hero-label">오늘의 명언</h1>
                <blockquote class="hero-quote" id="dailyQuote">
                    <p id="dailyQuoteText"></p>
                    <footer id="dailyQuoteAuthor"></footer>
                </blockquote>
                <button class="btn-refresh" id="newQuoteBtn" aria-label="다른 명언 보기">새로운 영감</button>
            </div>
        </section>

        <div id="mainContent">
            <section class="search-section" aria-label="명언 검색">
                <div class="container">
                    <div class="search-box">
                        <label for="searchInput" class="sr-only">명언 또는 인물 검색</label>
                        <input type="search" id="searchInput" placeholder="인물, 영화, 키워드로 명언을 찾아보세요..." autocomplete="off">
                        <div id="searchResults" class="search-results" style="display:none;" role="listbox"></div>
                    </div>
                </div>
            </section>

            <section class="categories-section" id="categories" aria-label="카테고리별 명언">
                <div class="container">
                    <h2 class="section-title">테마별 탐색</h2>
                    <div class="category-tabs" id="categoryTabs" role="tablist"></div>
                    <div class="quotes-grid" id="categoryQuotes" role="tabpanel"></div>
                </div>
            </section>

            <section class="people-section" id="people" aria-label="인물별 명언">
                <div class="container">
                    <h2 class="section-title">인물별 탐색</h2>
                    <p class="section-desc">리더, 사상가, 예술가들의 지혜를 만나보세요.</p>
                    <div class="people-grid" id="peopleGrid"></div>
                </div>
            </section>

            <section class="all-quotes-section" id="allQuotes" aria-label="전체 명언">
                <div class="container">
                    <h2 class="section-title">모든 명언 보기</h2>
                    <div class="quotes-masonry" id="allQuotesGrid"></div>
                    <button class="btn-load-more" id="loadMoreBtn">더 보기</button>
                </div>
            </section>
        </div>

        <section class="person-quotes-section" id="personQuotes" style="display:none;">
            <div class="container">
                <button class="btn-back" id="backToPeople">← 전체 목록으로</button>
                <div class="person-header" id="personHeader"></div>
                <div class="quotes-list" id="personQuotesList"></div>
            </div>
        </section>

    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 재스퍼의 명언 모음집. All rights reserved.</p>
                <p><a href="#">개인정보처리방침</a> | <a href="#">이용약관</a></p>
            </div>
        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
